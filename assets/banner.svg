<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080711" />
      <stop offset="50%" stop-color="#0f0e26" />
      <stop offset="100%" stop-color="#05050d" />
    </linearGradient>

    <!-- Theme Gradients -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>

    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.1" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="subtle-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Font Declarations */
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');

    .title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 52px;
      fill: url(#primary-grad);
      filter: url(#glow);
    }

    .subtitle {
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      font-size: 18px;
      fill: #94a3b8;
      letter-spacing: 2px;
    }

    .mono-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      fill: #64748b;
    }

    /* Keyframe Animations */
    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.05); }
    }

    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes dash {
      0% { stroke-dashoffset: 1000; }
      100% { stroke-dashoffset: 0; }
    }

    @keyframes scanline {
      0% { transform: translateY(-100px); opacity: 0; }
      50% { opacity: 0.5; }
      100% { transform: translateY(250px); opacity: 0; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(3deg); }
    }

    @keyframes glitch {
      0%, 100% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(-2px, -2px); }
      60% { transform: translate(2px, 2px); }
      80% { transform: translate(2px, -2px); }
    }

    /* Class Application */
    .bg-grid {
      stroke: #1e1b4b;
      stroke-width: 1;
      opacity: 0.3;
    }

    .ring-outer {
      transform-origin: 120px 125px;
      animation: rotate 20s linear infinite;
    }

    .ring-inner {
      transform-origin: 120px 125px;
      animation: rotate 10s linear infinite reverse;
    }

    .logo-container {
      transform-origin: 120px 125px;
      animation: float 6s ease-in-out infinite;
    }

    .pulse-element {
      transform-origin: 120px 125px;
      animation: pulse 4s ease-in-out infinite;
    }

    .animated-dash {
      stroke-dasharray: 8, 12;
      animation: dash 30s linear infinite;
    }

    .scan {
      fill: url(#accent-grad);
      animation: scanline 6s linear infinite;
      pointer-events: none;
    }

    .sparkle {
      animation: pulse 2s ease-in-out infinite;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="250" fill="url(#bg-grad)" rx="16" />
  
  <!-- Cyber Grid -->
  <path class="bg-grid animated-dash" d="M 0,25 L 800,25 M 0,50 L 800,50 M 0,75 L 800,75 M 0,100 L 800,100 M 0,125 L 800,125 M 0,150 L 800,150 M 0,175 L 800,175 M 0,200 L 800,200 M 0,225 L 800,225" />
  <path class="bg-grid animated-dash" d="M 50,0 L 50,250 M 100,0 L 100,250 M 150,0 L 150,250 M 200,0 L 200,250 M 250,0 L 250,250 M 300,0 L 300,250 M 350,0 L 350,250 M 400,0 L 400,250 M 450,0 L 450,250 M 500,0 L 500,250 M 555,0 L 555,250 M 600,0 L 600,250 M 650,0 L 650,250 M 700,0 L 700,250 M 750,0 L 750,250" />

  <!-- Scanline effect -->
  <rect class="scan" width="800" height="80" rx="8" />

  <!-- Background Glow Core -->
  <circle cx="120" cy="125" r="90" fill="#6366f1" opacity="0.08" filter="url(#glow)" />
  <circle cx="450" cy="125" r="180" fill="#a855f7" opacity="0.04" filter="url(#glow)" />

  <!-- Logo Graphics Group -->
  <g class="logo-container">
    <!-- Outer Ring -->
    <circle class="ring-outer" cx="120" cy="125" r="60" fill="none" stroke="#4f46e5" stroke-width="2" stroke-dasharray="10 30" />
    <circle class="ring-inner" cx="120" cy="125" r="50" fill="none" stroke="#d946ef" stroke-width="1.5" stroke-dasharray="40 10 5 10" />
    
    <!-- Central Shield/Folder Hexagon -->
    <polygon points="120,85 155,105 155,145 120,165 85,145 85,105" fill="#13113c" stroke="#818cf8" stroke-width="3" filter="url(#subtle-glow)" />
    
    <!-- File Archive Icon Detail -->
    <path d="M 108,110 L 132,110 L 132,140 C 132,142 130,144 128,144 L 112,144 C 110,144 108,142 108,140 Z" fill="none" stroke="#a855f7" stroke-width="2.5" stroke-linejoin="round" />
    <!-- Zipper Details -->
    <path d="M 120,110 L 120,132" stroke="#ec4899" stroke-width="3" stroke-dasharray="4 2" />
    <rect x="116" y="132" width="8" height="6" rx="2" fill="#ec4899" />
  </g>

  <!-- Typography Group -->
  <g transform="translate(210, 0)">
    <!-- Brand Title -->
    <text class="title" x="0" y="125">DeveloperZip</text>
    
    <!-- Animated pulse dot next to title -->
    <circle class="sparkle" cx="355" cy="98" r="6" fill="#ec4899" filter="url(#subtle-glow)" />

    <!-- Subtitle -->
    <text class="subtitle" x="0" y="162">INTELLIGENT PROJECT PACKAGER</text>

    <!-- Project Metrics (Visual Representation) -->
    <g transform="translate(0, 195)">
      <!-- Console prompt -->
      <text class="mono-text" x="0" y="0">&gt; npm run dev --status=active</text>
      <!-- Small dynamic bar graphic -->
      <rect x="250" y="-10" width="100" height="8" rx="4" fill="#1e293b" />
      <rect x="250" y="-10" width="85" height="8" rx="4" fill="url(#primary-grad)">
        <animate attributeName="width" values="10;85;60;85" dur="4s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>

  <!-- Cyber sparkles -->
  <circle class="sparkle" cx="720" cy="50" r="2" fill="#38bdf8" />
  <circle class="sparkle" cx="740" cy="180" r="3" fill="#fb7185" />
  <circle class="sparkle" cx="60" cy="40" r="1.5" fill="#34d399" />
</svg>
